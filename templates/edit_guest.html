<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Guest</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-white">

<div class="container mt-5">

<h2>Edit Guest</h2>

<form method="POST">

<div class="mb-3">
<label>Check-out</label>
<input type="date" name="checkout" value="{{ guest.checkout }}" class="form-control">
</div>

<div class="mb-3">
<label>Note</label>
<input type="text" name="note" value="{{ guest.note }}" class="form-control">
</div>

<button class="btn btn-success">Save</button>

</form>

</div>

</body>
</html>
