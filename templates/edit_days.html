<!DOCTYPE html>
<html>
<head>
    <title>Edit Days</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <a href="/room/{{ room.room }}" class="btn btn-secondary mb-3">⬅ Back</a>

    <div class="card p-4 shadow">
        <h3>Edit Days for {{ guest.name }}</h3>

        <p><strong>Current Stay:</strong> {{ guest.stay_days }} days</p>

        <form method="POST">
            <div class="mb-3">
                <label>Add or Remove days (example: 5 or -3)</label>
                <input type="number" name="days" class="form-control" required>
            </div>

            <button class="btn btn-warning">Save</button>
        </form>
    </div>

</div>

</body>
</html>
