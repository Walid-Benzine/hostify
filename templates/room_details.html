<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Room {{ room.room }}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container mt-5">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-white">Room {{ room.room }}</h2>
        <a href="/" class="btn btn-outline-light">⬅ Back</a>
    </div>

    <!-- ADD GUEST CARD -->
    <div class="card p-4 mb-4">
        <h4 class="mb-3">Add Guest</h4>

        <form method="POST" action="/add_guest/{{ room.room }}" class="row g-3">

            <div class="col-md-3">
                <input name="id" class="form-control" placeholder="ID" required>
            </div>

            <div class="col-md-3">
                <input name="name" class="form-control" placeholder="Name" required>
            </div>

            <div class="col-md-3">
                <input name="checkin" type="date" class="form-control" required>
            </div>

            <div class="col-md-3">
                <input name="checkout" type="date" class="form-control" required>
            </div>

            <div class="col-md-3">
                <input name="note" class="form-control" placeholder="Note (optional)">
            </div>

            <div class="col-md-2 d-grid">
                <button class="btn btn-success">Add</button>
            </div>

        </form>
    </div>

    <!-- GUESTS TABLE -->
    <div class="card p-4">
        <h4 class="mb-3">Guests</h4>

        <div class="glass-table p-3">
        <table class="table text-center align-middle">
            
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Check-in</th>
                    <th>Check-out</th>
                    <th>Note</th>
                    <th>Edit</th>
                    <th>Remove</th>
                </tr>
            </thead>

            <tbody>
                {% for g in guests %}
                <tr>
                    <td>{{ g.id }}</td>
                    <td>{{ g.name }}</td>
                    <td>{{ g.checkin }}</td>
                    <td>{{ g.checkout }}</td>
                    <td>{{ g.note }}</td>
                    
                    <td>
                    <a href="/edit_guest/{{ room.room }}/{{ g.id }}" class="btn btn-warning btn-sm">
                    Edit
                    </a>
                    </td>
                    
<td>
    <form method="POST"
          action="/delete_guest/{{ room.room }}/{{ g.id }}"
          onsubmit="return confirm('Remove this guest?')">
        <button class="btn btn-danger btn-sm">Delete</button>
    </form>
</td>
                </tr>
                {% endfor %}
            </tbody>

        </table>
        </div>
    </div>

</div>

</body>
</html>
