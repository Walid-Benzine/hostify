<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Room {{ room.room }}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container mt-5">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-white">Room {{ room.room }}</h2>
        <a href="/" class="btn btn-outline-light">⬅ Back</a>
    </div>

    <!-- ADD GUEST CARD -->
    <div class="card p-4 mb-4">
        <h4 class="mb-3">Add Guest</h4>

        <form method="POST" action="/add_guest/{{ room.room }}" class="row g-3">

            <div class="col-md-3">
                <input name="id" class="form-control" placeholder="ID" required>
            </div>

            <div class="col-md-4">
                <input name="name" class="form-control" placeholder="Name" required>
            </div>

            <div class="col-md-3">
                <input name="stay_days" type="number" class="form-control" placeholder="Days" required>
            </div>

            <div class="col-md-2 d-grid">
                <button class="btn btn-success">Add</button>
            </div>

        </form>
    </div>

    <!-- GUESTS TABLE -->
    <div class="card p-4">
        <h4 class="mb-3">Guests</h4>

        <div class="glass-table p-3">
        <table class="table text-center align-middle">
            
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Days Left</th>
                    <th>Change Days</th>
                    <th>Remove</th>
                </tr>
            </thead>

            <tbody>
                {% for g in guests %}
                <tr>
                    <td>{{ g.id }}</td>
                    <td>{{ g.name }}</td>

                    <td>
                        {% if g.days_left == 0 %}
                            <span class="badge bg-danger">Expired</span>
                        {% elif g.days_left <= 3 %}
                            <span class="badge bg-warning text-dark">
                                {{ g.days_left }} days
                            </span>
                        {% else %}
                            <span class="badge bg-success">
                                {{ g.days_left }} days
                            </span>
                        {% endif %}
                    </td>

                    <td>
                        <form method="POST" action="/edit_days/{{ room.room }}/{{ g.id }}" class="d-flex gap-2 justify-content-center">
                            <input name="change" type="number" class="form-control form-control-sm w-50">
                            <button class="btn btn-primary btn-sm">Update</button>
                        </form>
                        </td>
<td>
    <form method="POST"
          action="/delete_guest/{{ room.room }}/{{ g.id }}"
          onsubmit="return confirm('Remove this guest?')">
        <button class="btn btn-danger btn-sm">Delete</button>
    </form>
</td>
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>
        </div>
    </div>

</div>

</body>
</html>
